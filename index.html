<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zach Winship</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0c0c1a 0%, #111828 50%, #0a1830 100%);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(96,165,250,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .name {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            color: #e8eaed;
            letter-spacing: -2px;
            margin-bottom: 0.4rem;
            line-height: 1;
        }

        .tagline {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 3.5rem;
            font-weight: 500;
        }

        .choose-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        .cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 240px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 2rem 1.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card.pro::before { background: radial-gradient(ellipse at top, rgba(96,165,250,0.18), transparent 70%); }
        .card.fun::before { background: radial-gradient(ellipse at top, rgba(91,168,212,0.25), transparent 70%); }

        .card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.2); }
        .card:hover::before { opacity: 1; }
        .card:hover.pro { border-color: rgba(96,165,250,0.4); }
        .card:hover.fun { border-color: rgba(91,168,212,0.5); }

        .card-emoji { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

        .card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #e8eaed;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .card p {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .card-badge {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.25rem 0.85rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            position: relative;
            z-index: 1;
        }

        .pro .card-badge { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
        .fun .card-badge { background: rgba(91,168,212,0.15); color: #5ba8d4; border: 1px solid rgba(91,168,212,0.3); }

        .wrapper { animation: fadeUp 0.6s ease-out; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="name">Zach Winship</div>
        <div class="tagline">Quantitative Economics &bull; Data &bull; Research</div>
        <div class="choose-label">Choose your experience</div>
        <div class="cards">
            <a class="card pro" href="/html/pro.html">
                <span class="card-emoji">💼</span>
                <h3>Professional</h3>
                <p>Clean, minimal portfolio with projects, skills, and experience.</p>
                <span class="card-badge">STANDARD</span>
            </a>
            <a class="card fun" href="wii.html">
                <span class="card-emoji">🎮</span>
                <h3>Wii Edition</h3>
                <p>Navigate my portfolio like a Wii console. Channel grid, boot animations, the works.</p>
                <span class="card-badge">FUN MODE</span>
            </a>
        </div>
    </div>
</body>
</html>
